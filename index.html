<!DOCTYPE html>
<html lang="zh-CN" data-theme="dawn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>七大灵性法则 · 每日静观</title>
<link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root, [data-theme="dusk"]{
    --bg:#14161b; --raised:#1b1e25; --raised2:#20242c;
    --line:rgba(231,227,216,.09); --line2:rgba(231,227,216,.16);
    --ink:#e9e5da; --ink2:#a8a69c; --ink3:#717069;
    --in:#79bdb1; --in-soft:rgba(121,189,177,.13); --in-glow:rgba(121,189,177,.22);
    --out:#d2956d; --out-soft:rgba(210,149,109,.12); --out-glow:rgba(210,149,109,.20);
  }
  [data-theme="dawn"]{
    --bg:#ecedea; --raised:#ffffff; --raised2:#f5f6f3;
    --line:rgba(20,22,27,.10); --line2:rgba(20,22,27,.18);
    --ink:#22252a; --ink2:#5c605c; --ink3:#8a8d87;
    --in:#2c8475; --in-soft:rgba(44,132,117,.10); --in-glow:rgba(44,132,117,.16);
    --out:#ad6336; --out-soft:rgba(173,99,54,.09); --out-glow:rgba(173,99,54,.15);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Noto Serif SC",serif; font-weight:300;
    line-height:1.75; -webkit-font-smoothing:antialiased;
    transition:background .6s ease,color .6s ease;
  }
  .wrap{max-width:760px;margin:0 auto;padding:0 24px}

  /* ---- top bar ---- */
  .bar{display:flex;align-items:center;justify-content:space-between;
    padding:26px 0 18px;border-bottom:1px solid var(--line)}
  .brand{display:flex;align-items:baseline;gap:12px}
  .moon{font-size:18px;color:var(--ink2)}
  .brand b{font-weight:500;font-size:16px;letter-spacing:.04em}
  .brand .lat{font-family:"Cormorant",serif;font-weight:400;font-style:italic;
    font-size:14px;color:var(--ink3);letter-spacing:.02em}
  .theme{background:none;border:1px solid var(--line2);color:var(--ink2);
    width:34px;height:34px;border-radius:50%;cursor:pointer;font-size:14px;
    display:grid;place-items:center;transition:.3s}
  .theme:hover{color:var(--ink);border-color:var(--ink3)}

  /* ---- today / hero ---- */
  .today{position:relative;padding:64px 0 56px;text-align:center;overflow:hidden}
  .today[data-breath="in"]{--accent:var(--in);--accent-soft:var(--in-soft);--accent-glow:var(--in-glow)}
  .today[data-breath="out"]{--accent:var(--out);--accent-soft:var(--out-soft);--accent-glow:var(--out-glow)}
  .glow{position:absolute;top:46%;left:50%;width:380px;height:380px;
    transform:translate(-50%,-50%);border-radius:50%;pointer-events:none;z-index:0;
    background:radial-gradient(circle,var(--accent-glow) 0%,transparent 68%);
    animation:breathe 12s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:translate(-50%,-50%) scale(.92);opacity:.55}
    50%{transform:translate(-50%,-50%) scale(1.14);opacity:.95}}
  .today > *:not(.glow){position:relative;z-index:1}

  .eyebrow{display:flex;align-items:center;justify-content:center;gap:14px;
    margin-bottom:30px;font-size:13px;letter-spacing:.14em;color:var(--ink3)}
  .eyebrow .now{color:var(--ink2)}
  .eyebrow a{color:var(--ink3);text-decoration:none;border-bottom:1px solid var(--line2);
    padding-bottom:2px;transition:.3s;cursor:pointer}
  .eyebrow a:hover{color:var(--accent)}
  .eyebrow .dot{width:3px;height:3px;border-radius:50%;background:var(--line2)}

  .roman{font-family:"Cormorant",serif;font-size:19px;font-weight:500;
    letter-spacing:.32em;color:var(--accent);margin-bottom:6px}
  .phase{font-size:12px;letter-spacing:.3em;color:var(--ink3);margin-bottom:22px}
  .word{font-weight:500;font-size:clamp(3.4rem,12vw,5.2rem);line-height:1;
    letter-spacing:.06em;margin-bottom:16px}
  .law{font-size:15px;letter-spacing:.34em;color:var(--ink2);margin-bottom:26px}
  .essence{font-size:clamp(1.05rem,3.4vw,1.2rem);color:var(--ink2);font-weight:300;
    max-width:30ch;margin:0 auto;line-height:1.85}

  .rule{width:42px;height:1px;background:var(--accent);opacity:.5;margin:40px auto 36px}

  .practice{max-width:34rem;margin:0 auto;text-align:left}
  .p-label{font-size:12px;letter-spacing:.26em;color:var(--accent);margin-bottom:26px;
    text-align:center}
  .pitem{display:grid;grid-template-columns:auto 1fr;gap:20px;padding:24px 0;
    border-top:1px solid var(--line)}
  .pitem:first-child{border-top:none;padding-top:0}
  .pitem .idx{font-family:"Cormorant",serif;font-size:1.6rem;font-weight:500;
    color:var(--accent);line-height:1;opacity:.85;padding-top:2px}
  .pitem .pt{font-weight:500;font-size:1.18rem;letter-spacing:.05em;margin-bottom:11px;color:var(--ink)}
  .pitem .pb{font-size:1.08rem;font-weight:300;line-height:1.92;color:var(--ink)}

  a:focus-visible,button:focus-visible{outline:2px solid var(--in);outline-offset:3px}
  @media (prefers-reduced-motion:reduce){.glow{animation:none;opacity:.7}}
  @media (max-width:560px){
    .today{padding:48px 0 44px}
  }
</style>
</head>
<body>
<div class="wrap">

  <header class="bar">
    <div class="brand">
      <span class="moon">☾</span>
      <b>七大灵性法则</b>
      <span class="lat">Seven Spiritual Laws</span>
    </div>
    <button class="theme" id="theme" aria-label="切换昼夜">☾</button>
  </header>

  <section class="today" id="today" data-breath="in" aria-live="polite">
    <div class="glow" aria-hidden="true"></div>
    <div class="eyebrow" id="eyebrow"></div>
    <div class="roman" id="roman">I</div>
    <div class="phase" id="phase">吸 · 向内</div>
    <h1 class="word" id="word">静默</h1>
    <div class="law" id="law">纯粹潜能法则</div>
    <p class="essence" id="essence"></p>

    <div class="rule"></div>

    <div class="practice">
      <div class="p-label">今日练习</div>
      <div id="practices"></div>
    </div>
  </section>

</div>

<script>
  const LAWS = [
    { day:"周日", num:"I", word:"静默", law:"纯粹潜能法则", breath:"in",
      essence:"你的本性是纯粹的意识——一片万物由之而生、充满无限可能的场域。",
      practices:[
        {t:"静坐冥想", body:"每天留出安静独处的时间，至少静坐冥想两次，清晨与入夜各约三十分钟，借此与那片纯粹潜能的场域相连。"},
        {t:"亲近自然", body:"每天找一刻走进自然，静静体会每一个生命里都在运作的那份智慧——看一次日落，听一段水声，或只是闻一朵花。"},
        {t:"不评判", body:"为今天定一个基调：不急于评断所发生的一切。当评判升起时，提醒自己只是看着它，不卷入。"}
      ]},
    { day:"周一", num:"II", word:"给予", law:"给予法则", breath:"out",
      essence:"给予与领受，是宇宙中同一股能量流动的两种样子；让它流动，丰盛才会进来。",
      practices:[
        {t:"送出礼物", body:"今天无论走到哪里，都给遇见的每个人带点什么：一句赞美、一个微笑、一份祝福。最好的礼物，是关心、欣赏与爱。"},
        {t:"欣然领受", body:"也敞开地接收生活递来的馈赠，心怀感激地收下他人的好意，以及阳光、鸟鸣这些无声的礼物。"},
        {t:"让它循环", body:"想要什么，就先给出什么，让关心与善意不断进出，使财富、爱与你想要的一切在生命里持续流动。"}
      ]},
    { day:"周二", num:"III", word:"选择", law:"因果法则", breath:"in",
      essence:"每个动作都会生出一股回到自己身上的能量；因此，业的核心，是有意识地做选择。",
      practices:[
        {t:"觉察选择", body:"今天留意自己在每个当下所做的选择。仅仅是看见它，就把这个选择带入了清醒的觉知。"},
        {t:"考量后果", body:"每做一个选择前，问自己两件事：这个选择会带来什么后果？它会为我、也为被它影响的人带来快乐吗？"},
        {t:"聆听身体", body:"再向内心求一个指引，看身体的舒适或不适：舒适就放心前行，不适就停一停，再看清后果。"}
      ]},
    { day:"周三", num:"IV", word:"接纳", law:"最省力法则", breath:"out",
      essence:"自然不费力地运作——草不努力生长，它只是生长；与这股流动同行，便是最省力之道。",
      practices:[
        {t:"接纳", body:"今天接受人、处境与所发生的事如其所是。承认此刻本来如此——与这一刻较劲，等于在与整个宇宙较劲。"},
        {t:"承担责任", body:"不把处境归咎于任何人，也不归咎自己；把每个难处都看作一次机会，让「麻烦」成为创造新事物的起点。"},
        {t:"不设防", body:"放下捍卫自己观点、说服他人的需要。省下用来争对错的力气，对所有视角保持开放。"}
      ]},
    { day:"周四", num:"V", word:"意图", law:"意图与愿望法则", breath:"in",
      essence:"每个意图里，都已内含它实现的机制；把意图放进纯粹潜能的场域，无限的组织力便开始运作。",
      practices:[
        {t:"立定意图", body:"把你真正的愿望写下来，让意图清晰具体，再把它轻轻安放进内在的静默里。"},
        {t:"交托结果", body:"种下意图之后就放手，信任那更大的组织力，不执着于它该以何种方式、在何时实现。"},
        {t:"安住当下", body:"把注意力带回此刻，接受当下如其所是——意图朝向未来，但通往它的门一直在现在。"}
      ]},
    { day:"周五", num:"VI", word:"超然", law:"超然法则", breath:"out",
      essence:"自由藏在不确定里。放开对「已知」的紧抓，反而向无限的可能敞开。",
      practices:[
        {t:"放下执着", body:"今天练习不把「事情该怎样」强加于现实。保有意图，却不绑定结果，也不依赖熟悉与安全感。"},
        {t:"拥抱不确定", body:"把未知当作通往自由的路，而非威胁；正是在不确定里，才有崭新的可能在等待。"},
        {t:"向可能敞开", body:"不急着用旧办法解决问题，安住在所有可能性的场域中，让答案在合适的时机自己浮现。"}
      ]},
    { day:"周六", num:"VII", word:"服务", law:"达摩法则", breath:"out",
      essence:"你有独一无二的天赋，以及表达它的独特方式；当天赋遇上服务，便走在了此生的目的上。",
      practices:[
        {t:"找回更高的自我", body:"留一刻安静，去亲近那个在身体与心智之下、超越自我（ego）的、更深的你。"},
        {t:"认出天赋", body:"列出你独有的天赋，以及借由它你最爱做的几件事——那些做起来会让你忘记时间的，往往就是线索。"},
        {t:"问「我能如何服务」", body:"每天问自己：我能如何帮助、如何服务？用你的天赋去回应他人的需要，把「我能得到什么」换成「我能给出什么」。"}
      ]}
  ];

  const todayIdx = new Date().getDay();
  let sel = todayIdx;      // 当前展示的星期
  let pi = 0;              // 当前练习序号
  let random = false;      // 是否随机模式

  const $ = id => document.getElementById(id);

  function render(){
    const L = LAWS[sel];
    $("today").dataset.breath = L.breath;
    $("roman").textContent = L.num;
    $("phase").textContent = L.breath === "in" ? "吸 · 向内" : "呼 · 向外";
    $("word").textContent = L.word;
    $("law").textContent = L.law;
    $("essence").textContent = L.essence;

    const nums = ["I","II","III","IV"];
    const box = $("practices"); box.innerHTML = "";
    L.practices.forEach((p, i) => {
      const d = document.createElement("div");
      d.className = "pitem";
      d.innerHTML = '<div class="idx">' + nums[i] + '</div>' +
        '<div><div class="pt">' + p.t + '</div><div class="pb">' + p.body + '</div></div>';
      box.appendChild(d);
    });

    // eyebrow
    const eb = $("eyebrow");
    let label;
    if (random) label = '<span class="now">随机一条</span>';
    else if (sel === todayIdx) label = '<span class="now">今天 · ' + L.day + '</span>';
    else label = '<span class="now">' + L.day + '</span> · 预览';
    let html = label;
    html += '<span class="dot"></span><a id="rand">随机一条 ↻</a>';
    if (sel !== todayIdx || random) html += '<span class="dot"></span><a id="back">回到今天</a>';
    eb.innerHTML = html;
    $("rand").onclick = pickRandom;
    const back = $("back"); if (back) back.onclick = goToday;
  }

  function goToday(){ sel = todayIdx; pi = 0; random = false; render(); }
  function pickRandom(){
    sel = Math.floor(Math.random() * 7);
    pi = Math.floor(Math.random() * LAWS[sel].practices.length);
    random = true; render();
  }

  $("theme").onclick = () => {
    const html = document.documentElement;
    const dusk = html.dataset.theme === "dusk";
    html.dataset.theme = dusk ? "dawn" : "dusk";
    $("theme").textContent = dusk ? "☾" : "☀";
  };

  render();
</script>
</body>
</html>
